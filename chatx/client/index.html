<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MRIRYHED Chat · Log in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- login / signup -->
  <div class="login" id="login">
    <div class="login__card">
      <div class="login__brand"><span class="login__logo">M</span> Chat</div>
      <p class="login__tag">Realtime chat · AI assistant · feed · friends <em>by MRIRYHED</em></p>

      <div class="seg">
        <button id="tabLogin" class="seg__btn is-active" type="button">Log in</button>
        <button id="tabSignup" class="seg__btn" type="button">Sign up</button>
      </div>

      <input id="username" placeholder="Username" maxlength="24" autocomplete="off" />
      <input id="password" type="password" placeholder="Password" autocomplete="off" />

      <button id="authBtn">Log in →</button>
      <p class="login__hint" id="authHint">New here? Switch to <b>Sign up</b>. Accounts are stored locally on this device.</p>
    </div>
  </div>

  <footer class="brand-foot">
    <span class="bf-brand">MRIRYHED</span>
    <span class="bf-tag">Three worlds. One name. Eternal.</span>
    <span class="bf-pow">Powered by MRIRYHED</span>
  </footer>

  <script src="login.js"></script>
</body>
</html>
